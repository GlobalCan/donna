# Donna — Slack app manifest
#
# Source-of-truth declaration of every scope, slash command, event
# subscription, and interactive component the bot needs. Kept in repo
# so scope creep is reviewable in PRs (Codex review recommendation,
# 2026-04-30).
#
# Usage:
#   1. Operator goes to https://api.slack.com/apps
#   2. Click "Create New App" → "From an app manifest"
#   3. Pick the personal Slack workspace
#   4. Paste the YAML below into the editor
#   5. Click "Create" → "Install to Workspace" → approve scopes
#   6. From "OAuth & Permissions": copy `xoxb-...` (SLACK_BOT_TOKEN)
#   7. From "Basic Information" → "App-Level Tokens" → "Generate":
#        name "donna-socket-mode", scope `connections:write` → copy
#        `xapp-...` (SLACK_APP_TOKEN)
#   8. Workspace Team ID: visible in the app's install page or via
#        any API response. Starts `T0...` (SLACK_TEAM_ID).
#
# Token rotation is intentionally NOT enabled for v0.5.0 — see Codex
# review notes in CHANGELOG. With rotation off, tokens don't expire;
# refresh-token flow is bolt-on work for a later release.
#
# Minimum scopes per Codex (v0.5.0):
#   - chat:write           — post messages (DMs and channels Donna is in)
#   - commands             — receive slash commands
#   - app_mentions:read    — receive @donna mentions in channels
#   - im:history           — read DM history (for session_history fetches)
#   - im:write             — proactively open DMs (budget alerts, watchdog)
#   - connections:write    — Socket Mode app-level token (granted on the
#                            app token, not the bot token)
#
# Deliberately AVOIDED:
#   - chat:write.public    — would let bot post to channels it isn't a
#                            member of. Prefer explicit channel invitation.
#   - channels:history     — would let bot read all channel chat, not
#                            just mentions. Privacy + token blast radius.
#   - files:read           — Slack file ingest is out of scope until we
#                            explicitly build attachment-via-Slack handling.
#   - reactions:read/write — using Block Kit buttons for consent instead.

display_information:
  name: Donna
  description: Personal AI assistant — solo-user, allowlisted, runs on a single droplet
  background_color: "#1a1a2e"

features:
  # Slack apps default to no DM tab, which makes the bot un-DM-able
  # ("Messaging isn't available — Donna is an app"). Operator hit this
  # during Phase 0 smoke 2026-05-01. Enabling messages_tab_enabled +
  # messages_tab_read_only_enabled=false makes the bot DM-able. We don't
  # use a custom home tab — set home_tab_enabled=false to skip Slack's
  # default "configure your home" placeholder.
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

  bot_user:
    display_name: Donna
    always_online: true

  slash_commands:
    # All commands are prefixed `/donna_*`. Operator's workspace
    # rejected the bare names (`/ask`, `/status`, etc.) as "invalid
    # name" during install — Slack reserves these even when no other
    # app visibly registers them. Prefix sidesteps the conflict and
    # disambiguates when other workspace apps share names. v0.5.0
    # 2026-05-01 (KNOWN_ISSUES V50-4).
    - command: /donna_ask
      description: Scoped grounded question
      should_escape: false

    - command: /donna_speculate
      description: Speculate in scope's voice
      should_escape: false

    - command: /donna_debate
      description: Debate two scopes
      should_escape: false

    - command: /donna_schedule
      description: Add a cron schedule (modal)
      should_escape: false

    - command: /donna_schedules
      description: List schedules
      should_escape: false

    - command: /donna_history
      description: Recent jobs
      should_escape: false

    - command: /donna_budget
      description: Today's spend
      should_escape: false

    - command: /donna_cancel
      description: Cancel a job (or schedule with sch_ prefix)
      should_escape: false

    - command: /donna_schedule_disable
      description: Disable a schedule (sch_...) so it stops firing
      should_escape: false

    - command: /donna_brief_setup
      description: Set up a daily morning brief (modal)
      should_escape: false

    - command: /donna_brief_run_now
      description: Dry-run a configured morning brief immediately
      should_escape: false

    - command: /donna_validate
      description: Validate a URL with verbatim citations + SSRF safety
      should_escape: false

    - command: /donna_status
      description: Job status
      should_escape: false

    - command: /donna_model
      description: Set model tier
      should_escape: false

    - command: /donna_heuristics
      description: List heuristics
      should_escape: false

    - command: /donna_approve_heuristic
      description: Approve heuristic
      should_escape: false

    - command: /donna_alert_settings
      description: Inspect or change the alert digest interval (v0.7.3)
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - app_mentions:read
      - im:history
      - im:write

settings:
  event_subscriptions:
    bot_events:
      - app_mention      # @donna in any channel Donna is invited to
      - message.im       # DMs sent to Donna

  interactivity:
    is_enabled: true
    # Socket Mode — no inbound HTTPS endpoint. Slack pushes events via
    # the bot's outbound WebSocket, same connection model as Discord
    # gateway. App-level token (xapp-...) with `connections:write`
    # scope is what makes this work; see slack_bolt SocketModeHandler.
    # Codex 2026-04-30: "Socket Mode is the right choice for a single
    # droplet."

  socket_mode_enabled: true
  token_rotation_enabled: false
  org_deploy_enabled: false
