# Donna — production compose (droplet)
# Local dev: use .env + `python -m donna.main` directly.
services:
  bot:
    image: ${DONNA_IMAGE:-ghcr.io/globalcan/donna:latest}
    container_name: donna-bot
    restart: unless-stopped
    command: ["python", "-m", "donna.main"]
    # Override the container's default USER (uid 10001) with the host's `bot`
    # uid (1001 on a freshly-harden'd DO droplet). This makes bind-mounted
    # host files (e.g. /etc/bot/age.key, /data/donna/*) readable/writable
    # without chmod 644/777 hacks on the host side.
    user: "${DONNA_UID:-1001}:${DONNA_GID:-1001}"
    env_file: .env
    environment:
      DONNA_PROCESS_ROLE: bot
    volumes:
      - /data/donna:/data:rw
      - /etc/bot/age.key:/run/secrets/age.key:ro
      - ./secrets/prod.enc.yaml:/app/secrets/prod.enc.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    image: ${DONNA_IMAGE:-ghcr.io/globalcan/donna:latest}
    container_name: donna-worker
    restart: unless-stopped
    command: ["python", "-m", "donna.worker"]
    user: "${DONNA_UID:-1001}:${DONNA_GID:-1001}"
    env_file: .env
    environment:
      DONNA_PROCESS_ROLE: worker
    volumes:
      - /data/donna:/data:rw
      - /etc/bot/age.key:/run/secrets/age.key:ro
      - ./secrets/prod.enc.yaml:/app/secrets/prod.enc.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Phoenix observability — pinned to a known-good tag. `:latest` was broken
  # upstream on 2026-04-23 (their own ModuleNotFoundError: phoenix at startup),
  # so don't follow floating tags. Bump the pin after verifying a new version
  # works — the latest docker hub tag is printed by:
  #   curl -sS "https://hub.docker.com/v2/repositories/arizephoenix/phoenix/tags?page_size=20"
  phoenix:
    image: arizephoenix/phoenix:14.9.0
    container_name: donna-phoenix
    restart: unless-stopped
    environment:
      PHOENIX_WORKING_DIR: /phoenix
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: "30"
      PHOENIX_GRPC_PORT: "4317"
      PHOENIX_PORT: "6006"
    volumes:
      - /data/phoenix:/phoenix
    ports:
      # Bind to localhost only — reachable via SSH tunnel
      - "127.0.0.1:6006:6006"
      - "127.0.0.1:4317:4317"
    mem_limit: 768m
