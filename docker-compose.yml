# Donna — production compose (droplet)
# Local dev: use .env + `python -m donna.main` directly.
services:
  bot:
    image: ${DONNA_IMAGE:-ghcr.io/globalcan/donna:latest}
    container_name: donna-bot
    restart: unless-stopped
    command: ["python", "-m", "donna.main"]
    # Override the container's default USER (uid 10001) with the host's `bot`
    # uid (1001 on a freshly-harden'd DO droplet). This makes bind-mounted
    # host files (e.g. /etc/bot/age.key, /data/donna/*) readable/writable
    # without chmod 644/777 hacks on the host side.
    user: "${DONNA_UID:-1001}:${DONNA_GID:-1001}"
    env_file: .env
    environment:
      DONNA_PROCESS_ROLE: bot
    volumes:
      - /data/donna:/data:rw
      - /etc/bot/age.key:/run/secrets/age.key:ro
      - ./secrets/prod.enc.yaml:/app/secrets/prod.enc.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  worker:
    image: ${DONNA_IMAGE:-ghcr.io/globalcan/donna:latest}
    container_name: donna-worker
    restart: unless-stopped
    command: ["python", "-m", "donna.worker"]
    user: "${DONNA_UID:-1001}:${DONNA_GID:-1001}"
    env_file: .env
    environment:
      DONNA_PROCESS_ROLE: worker
    volumes:
      - /data/donna:/data:rw
      - /etc/bot/age.key:/run/secrets/age.key:ro
      - ./secrets/prod.enc.yaml:/app/secrets/prod.enc.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Phoenix observability — temporarily disabled. `arizephoenix/phoenix:latest`
  # currently ships broken (ModuleNotFoundError: No module named 'phoenix' at
  # startup, 2026-04-23). Re-enable with a pinned working tag once upstream is
  # fixed. OTEL exporter in donna will log warnings about unreachable endpoint
  # but the bot/worker continue to function.
