# Donna — production compose (droplet)
# Local dev: use .env + `python -m donna.main` directly.
services:
  bot:
    image: ${DONNA_IMAGE:-ghcr.io/globalcan/donna:latest}
    container_name: donna-bot
    restart: unless-stopped
    command: ["python", "-m", "donna.main"]
    # Override the container's default USER (uid 10001) with the host's `bot`
    # uid (1001 on a freshly-harden'd DO droplet). This makes bind-mounted
    # host files (e.g. /etc/bot/age.key, /data/donna/*) readable/writable
    # without chmod 644/777 hacks on the host side.
    user: "${DONNA_UID:-1001}:${DONNA_GID:-1001}"
    env_file: .env
    environment:
      DONNA_PROCESS_ROLE: bot
    volumes:
      - /data/donna:/data:rw
      - /etc/bot/age.key:/run/secrets/age.key:ro
      - ./secrets/prod.enc.yaml:/app/secrets/prod.enc.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # v0.6: bot owns migrations exclusively. Healthcheck watches for the
    # marker entrypoint.sh writes after `alembic upgrade head` succeeds;
    # worker's depends_on gate below uses this to start with a known-
    # current schema. Pre-v0.6 the worker also ran alembic and raced bot's
    # migration step, leaving partial schema on failure (caught 2026-05-01
    # during v0.5.2 deploy).
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/migrations_complete"]
      interval: 2s
      timeout: 1s
      retries: 60
      start_period: 5s

  worker:
    image: ${DONNA_IMAGE:-ghcr.io/globalcan/donna:latest}
    container_name: donna-worker
    restart: unless-stopped
    command: ["python", "-m", "donna.worker"]
    user: "${DONNA_UID:-1001}:${DONNA_GID:-1001}"
    env_file: .env
    environment:
      DONNA_PROCESS_ROLE: worker
    volumes:
      - /data/donna:/data:rw
      - /etc/bot/age.key:/run/secrets/age.key:ro
      - ./secrets/prod.enc.yaml:/app/secrets/prod.enc.yaml:ro
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # v0.6: gate worker startup on bot's migration completion. Eliminates
    # the alembic race that wedged the v0.5.2 deploy. service_healthy
    # waits for the bot's healthcheck above (which itself waits for
    # /tmp/migrations_complete to appear).
    depends_on:
      bot:
        condition: service_healthy

  # Observability — Jaeger all-in-one. Replaced Phoenix after the 14.x line
  # shipped broken upstream (`ModuleNotFoundError: No module named 'phoenix'`
  # on 14.9.0 and :latest, 2026-04-23). Same OTLP-gRPC port (4317), so the
  # bot/worker exporter code is unchanged — only the hostname moves. UI at
  # :16686; port-forward from your laptop via
  #   ssh -L 16686:localhost:16686 -i <key> bot@DROPLET
  # then open http://localhost:16686 and filter by service=donna.
  #
  # Tradeoff vs Phoenix: Jaeger's trace UI is generic distributed-tracing,
  # not LLM-native (no special prompt/completion views). In-memory storage
  # by default — spans older than the Jaeger container's restart are gone.
  # That's acceptable for Donna's single-user debugging usage; traces that
  # matter for audit are ALSO written to the `traces` SQLite table via
  # SqliteSpanProcessor and survive container restarts / deploys.
  #
  # If Phoenix is fixed later and you want the LLM-native UI back, swap
  # image/container_name/service references and set
  # OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:4317 in .env.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: donna-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"   # Web UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC — where bot/worker export to
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
