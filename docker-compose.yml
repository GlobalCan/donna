  #      Candidates to try (newest first, all untested here):
  #        - 13.5.0, 13.0.0, 12.9.0 (older, likely predate the breakage)
  #      Pin whichever works.
  #
  #   B. Swap to Jaeger all-in-one. Pros: same OTLP-gRPC endpoint so no
  #      code changes; known-working image. Cons: generic trace UI (no
